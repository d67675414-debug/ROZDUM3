{% extends "base.html" %}
{% block title %}Редактировать пост — ROZDUM{% endblock %}
{% block content %}

<section class="form-card card">
    <div class="back-row">
        <a class="back-btn" href="{{ url_for('topic_view', topic_id=topic.id) }}">← Назад</a>
    </div>

    <h1>Редактировать пост</h1>

    {% if topic.image %}
        <img class="topic-image edit-preview" src="{{ url_for('static', filename='uploads/' ~ topic.image) }}" alt="current image">
    {% endif %}

    <form method="POST" enctype="multipart/form-data" id="editTopicForm">
        <div class="field">
            <label>Заголовок</label>
            <input type="text" name="title" id="editTitle" value="{{ topic.title }}" required>
        </div>

        <div class="field">
            <label>Текст</label>
            <textarea name="content" id="editContent" rows="10" required>{{ topic.content }}</textarea>
        </div>

        <div class="field">
            <label class="file-label">Замени фото, если нужно</label>
            <input type="file" name="image" accept="image/*">
        </div>

        <div class="form-actions">
            <a class="btn-ghost" href="{{ url_for('topic_view', topic_id=topic.id) }}">Назад</a>
            <button class="btn-primary" type="submit">Сохранить</button>
        </div>
    </form>
</section>

<script>
    const titleEl = document.getElementById("editTitle");
    const contentEl = document.getElementById("editContent");
    const draftKey = "rozdum_edit_topic_{{ topic.id }}";

    function saveDraft() {
        localStorage.setItem(draftKey, JSON.stringify({
            title: titleEl.value || "",
            content: contentEl.value || ""
        }));
    }

    function loadDraft() {
        try {
            const raw = localStorage.getItem(draftKey);
            if (!raw) return;
            const data = JSON.parse(raw);
            if (data.title) titleEl.value = data.title;
            if (data.content) contentEl.value = data.content;
        } catch (e) {}
    }

    titleEl.addEventListener("input", saveDraft);
    contentEl.addEventListener("input", saveDraft);

    document.getElementById("editTopicForm").addEventListener("submit", function () {
        localStorage.removeItem(draftKey);
    });

    loadDraft();
</script>

{% endblock %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
